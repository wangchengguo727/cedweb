<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>综合刷题网站｜历史 Java 数据库 英语</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#657186;--primary:#2563eb;--primary-dark:#1d4ed8;--green:#16a34a;--red:#dc2626;--amber:#f59e0b;--line:#e5e9f2;--soft:#eef4ff;--purple:#7c3aed;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 170px);color:var(--text)}
    .app{width:min(780px,100%);margin:0 auto;padding:16px 14px 96px}.hero{padding:20px 4px 12px}.title{margin:0;font-size:26px;font-weight:850;letter-spacing:-.5px}.sub{margin:8px 0 0;color:var(--muted);line-height:1.55;font-size:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 12px 36px rgba(17,24,39,.08);padding:16px;margin:12px 0}.grid{display:grid;gap:12px}.two{grid-template-columns:1fr 1fr}.field{display:grid;gap:6px;font-size:13px;color:var(--muted)}select{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px 12px;font-size:15px;color:var(--text);outline:none}.mode{display:grid;gap:8px}.mode label{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:16px;padding:12px;background:#fafcff;font-size:14px;line-height:1.45}.mode input{margin-top:2px}.toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border:1px solid var(--line);border-radius:16px;background:#fafcff}.switch{position:relative;width:48px;height:28px}.switch input{display:none}.slider{position:absolute;inset:0;border-radius:999px;background:#cbd5e1;transition:.2s}.slider:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;border-radius:50%;background:white;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:.2s}.switch input:checked + .slider{background:var(--primary)}.switch input:checked + .slider:before{transform:translateX(20px)}button{border:0;border-radius:16px;padding:13px 16px;font-size:16px;font-weight:750;cursor:pointer}.primary{background:var(--primary);color:white}.primary:active{background:var(--primary-dark)}.ghost{background:#eef4ff;color:#1d4ed8}.danger{background:#fff1f2;color:#be123c}.row{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:10px;text-align:center}.stat b{display:block;font-size:20px}.stat span{font-size:12px;color:var(--muted)}.quizTop{position:sticky;top:0;z-index:5;background:rgba(245,247,251,.88);backdrop-filter:blur(12px);padding:10px 0 8px}.bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden}.bar>span{display:block;height:100%;background:var(--primary);width:0%;transition:.2s}.tag{display:inline-flex;align-items:center;height:28px;padding:0 10px;border-radius:999px;background:#eef4ff;color:#1d4ed8;font-size:12px;font-weight:750}.tag.multi{background:#fef3c7;color:#92400e}.tag.judge{background:#f3e8ff;color:#6d28d9}.source{margin-top:10px;color:var(--muted);font-size:13px;line-height:1.5}.qtitle{margin:12px 0 12px;font-size:20px;font-weight:800;line-height:1.5}.options{display:grid;gap:10px}.option{width:100%;display:flex;gap:12px;align-items:flex-start;text-align:left;border:2px solid var(--line);background:#fff;color:var(--text);border-radius:18px;padding:14px;font-weight:650;line-height:1.45;min-height:56px;touch-action:manipulation}.option .letter{flex:0 0 30px;height:30px;border-radius:10px;display:grid;place-items:center;background:#f1f5f9;color:#334155;font-weight:850}.option.selected{border-color:var(--primary);background:#eff6ff}.option.selected .letter{background:var(--primary);color:#fff}.option.correct{border-color:var(--green);background:#f0fdf4}.option.correct .letter{background:var(--green);color:#fff}.option.wrong{border-color:var(--red);background:#fff1f2}.option.wrong .letter{background:var(--red);color:#fff}.option:disabled{opacity:1}.explain{display:none;margin-top:12px;border-radius:18px;padding:14px;background:#f8fafc;border:1px dashed #cbd5e1;line-height:1.55}.explain.show{display:block}.ok{color:var(--green)}.bad,.wrongTxt{color:var(--red)}.answer-line{font-size:14px;margin-top:6px;color:#334155}.bottomBar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:10}.bottomInner{width:min(780px,100%);margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.hide{display:none!important}.review-list{display:grid;gap:12px}.review-item{border:1px solid var(--line);border-radius:18px;padding:12px;background:#fff}.review-head{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.review-q{margin-top:8px;font-weight:700;line-height:1.5}.empty{color:var(--muted);text-align:center;padding:20px}.pillGroup{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.pill{font-size:12px;background:#f1f5f9;border:1px solid var(--line);border-radius:999px;padding:6px 9px;color:#475569}@media(max-width:520px){.two{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.title{font-size:24px}.qtitle{font-size:19px}.card{border-radius:18px;padding:14px}.app{padding-left:12px;padding-right:12px}select,button{font-size:15px}.bottomInner{grid-template-columns:1fr 1fr}.option{padding:13px}}
  </style>
</head>
<body>
  <main class="app">
    <section id="home">
      <div class="hero">
        <h1 class="title">综合刷题网站</h1>
        <p class="sub">已整合中国近现代史、Java、数据库 / SQL / MySQL、英语词汇题库，共 <b id="totalCount"></b> 道题。手机端单文件网页，刷新或重新开始都会重新打乱题目。</p>
      </div>
      <div class="card grid">
        <label class="field"><span>题库分类</span><select id="sourceSelect"></select></label>
        <div class="grid two">
          <label class="field"><span>题型</span><select id="typeSelect"></select></label>
          <label class="field"><span>本次题数</span><select id="countSelect"><option value="all">全部</option><option value="10">10 题</option><option value="20">20 题</option><option value="30">30 题</option><option value="50">50 题</option><option value="100">100 题</option><option value="150">150 题</option><option value="200">200 题</option></select></label>
        </div>
        <div class="mode">
          <label><input type="radio" name="mode" value="instant" checked><span><b>做一题出一题答案</b><br><small>选择后点“确认本题”，立即显示对错和正确答案。</small></span></label>
          <label><input type="radio" name="mode" value="exam"><span><b>全部做完再出答案</b><br><small>像考试一样先完成全部题目，最后统一交卷。</small></span></label>
        </div>
        <div class="toggle"><span><b>随机打乱题目</b><br><small style="color:var(--muted)">每次开始都会重新洗牌</small></span><label class="switch"><input id="shuffleToggle" type="checkbox" checked><span class="slider"></span></label></div>
        <button id="startBtn" class="primary">开始刷题</button>
      </div>
      <div class="stats" id="homeStats"></div>
      <div class="card">
        <b>已分类题库</b>
        <div class="pillGroup" id="sourcePills"></div>
      </div>
    </section>

    <section id="quiz" class="hide">
      <div class="quizTop">
        <div class="row"><b id="progressText"></b><span id="scoreText" class="tag"></span></div>
        <div class="bar" style="margin-top:8px"><span id="progressFill"></span></div>
      </div>
      <div class="card">
        <div class="row"><div><span id="typeTag" class="tag"></span> <span id="sourceTag" class="tag"></span></div><button id="quitBtn" class="danger" type="button">退出</button></div>
        <div id="qSource" class="source"></div>
        <div id="qTitle" class="qtitle"></div>
        <div id="options" class="options"></div>
        <div id="explain" class="explain"></div>
      </div>
    </section>

    <section id="result" class="hide">
      <div class="hero"><h1 class="title">本次结果</h1><p class="sub">下面是成绩统计和题目回顾。</p></div>
      <div class="stats" id="resultStats"></div>
      <div class="card grid">
        <button id="retryWrongBtn" class="ghost">只刷本次错题</button>
        <button id="restartBtn" class="primary">返回首页</button>
      </div>
      <div class="review-list" id="reviewList"></div>
    </section>
  </main>

  <div id="bottomBar" class="bottomBar hide"><div class="bottomInner"><button id="prevBtn" class="ghost">上一题</button><button id="mainBtn" class="primary">确认本题</button></div></div>

<script>
const QUESTION_BANK = [{"id": "S1-Q1", "source": "练习题（二）｜社会主义建设与改革开放", "number": 1, "type": "单选题", "question": "1956年毛泽东作的《论十大关系》的报告，是探索中国社会主义建设道路的重要理论成果。《论十大关系》围绕的基本方针是()。", "options": {"A": "中国共产党同民主党派长期共存、互相监督", "B": "坚持百花齐放、百家争鸣", "C": "调动一切积极因素，把我国建设成为一个强大的社会主义国家", "D": "调整、巩固、充实、提 高"}, "answer": "C", "sourceId": "S1"}, {"id": "S1-Q2", "source": "练习题（二）｜社会主义建设与改革开放", "number": 2, "type": "单选题", "question": "1956年9月，党的八大提出的我国国内的主要矛盾是()。", "options": {"A": "无产阶级同资产阶级的矛盾", "B": "人民大众同反革命残余势力的矛盾", "C": "开展社会主义道路与资本主义道路的决战", "D": "人民对于经济文化迅速发展的需要同当前经济文化不能满足人民需要的状况之间的矛盾"}, "answer": "D", "sourceId": "S1"}, {"id": "S1-Q3", "source": "练习题（二）｜社会主义建设与改革开放", "number": 3, "type": "单选题", "question": "生产资料的社会主义改造完成以后，国家政治生活的主题是()。", "options": {"A": "进行政治体制和经济体制改革", "B": "坚持四项基本原则", "C": "正确处理人民内部矛盾", "D": "开展阶级斗争"}, "answer": "C", "sourceId": "S1"}, {"id": "S1-Q4", "source": "练习题（二）｜社会主义建设与改革开放", "number": 4, "type": "单选题", "question": "毛泽东在《关于正确处理人民内部矛盾的问题》中提出，解决社会主义社会基本矛盾的途径是()。", "options": {"A": "进行新民主主义革命", "B": "进行社会主义改造", "C": "依靠社会主义制度本身的自我调整和自我完善", "D": "进行无产阶级专政下的继续革命"}, "answer": "C", "sourceId": "S1"}, {"id": "S1-Q5", "source": "练习题（二）｜社会主义建设与改革开放", "number": 5, "type": "单选题", "question": "1958年 9月，全国范围内掀起了人民公社化运动，人民公社的基本特点是()。", "options": {"A": "政社合一", "B": "一大二公", "C": "一平二调", "D": "平均分配"}, "answer": "B", "sourceId": "S1"}, {"id": "S1-Q6", "source": "练习题（二）｜社会主义建设与改革开放", "number": 6, "type": "单选题", "question": "苏联开始暴露他们在社会主义建设中的一些缺点和错误是在()。", "options": {"A": "1953年斯大林逝世后", "B": "赫鲁晓夫上台后", "C": "苏共 20大", "D": "我国社会主义改在完成之时"}, "answer": "C", "sourceId": "S1"}, {"id": "S1-Q7", "source": "练习题（二）｜社会主义建设与改革开放", "number": 7, "type": "单选题", "question": "社会主义社会基本矛盾的性质是()。", "options": {"A": "对抗性质的", "B": "阶级之间的矛盾", "C": "必须用暴力加以解决", "D": "是非对抗性的"}, "answer": "D", "sourceId": "S1"}, {"id": "S1-Q8", "source": "练习题（二）｜社会主义建设与改革开放", "number": 8, "type": "单选题", "question": "“文化大革命”的导火线是()。", "options": {"A": "《评新编历史剧 》", "B": "五·一六通知", "C": "《炮打司令部——我的第一张大字报》", "D": "《关于无 let state = null;
const $ = id => document.getElementById(id);

function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function escapeHtml(str){return String(str??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
function optLetters(q){return Object.keys(q.options||{}).sort()}
function sameAnswer(a,b){return (a||[]).slice().sort().join('') === String(b||'').split('').sort().join('')}
function chosenString(q){return (state.answers[q.id]||[]).slice().sort().join('')}
function isAnswered(q){return (state.answers[q.id]||[]).length>0}
function correctCount(){return state.questions.filter(q=>sameAnswer(state.answers[q.id]||[],q.answer)).length}
function answeredCount(){return state.questions.filter(q=>isAnswered(q)).length}
function getMode(){return document.querySelector('input[name="mode"]:checked').value}
function answerText(q, letters){return String(letters||'').split('').filter(Boolean).map(l=>`${l}. ${q.options[l]||''}`).join('；') || '未作答'}

function initHome(){
  $('totalCount').textContent=QUESTION_BANK.length;
  $('sourceSelect').innerHTML=`<option value="all">全部题库（${QUESTION_BANK.length} 题）</option>`+SOURCES.map(s=>`<option value="${s.id}">${s.title}（${s.count}题）</option>`).join('');
  const typeCounts={}; QUESTION_BANK.forEach(q=>typeCounts[q.type]=(typeCounts[q.type]||0)+1);
  $('typeSelect').innerHTML=`<option value="all">全部题型</option>`+Object.keys(typeCounts).map(t=>`<option value="${t}">只刷${t.replace('题','')}（${typeCounts[t]}题）</option>`).join('');
  $('homeStats').innerHTML=`<div class="stat"><b>${QUESTION_BANK.length}</b><span>总题数</span></div>`+Object.entries(typeCounts).map(([t,c])=>`<div class="stat"><b>${c}</b><span>${t}</span></div>`).join('');
  $('sourcePills').innerHTML=SOURCES.map(s=>`<span class="pill">${escapeHtml(s.title)}：${s.count}题</span>`).join('');
}
function buildPool(customPool=null){
  let pool=customPool?customPool.slice():QUESTION_BANK.slice();
  if(!customPool){const sid=$('sourceSelect').value,typ=$('typeSelect').value;if(sid!=='all')pool=pool.filter(q=>q.sourceId===sid);if(typ!=='all')pool=pool.filter(q=>q.type===typ);if($('shuffleToggle').checked)pool=shuffle(pool);const cv=$('countSelect').value;if(cv!=='all')pool=pool.slice(0,Number(cv));}
  return pool;
}
function startQuiz(customPool=null){
  const pool=buildPool(customPool); if(!pool.length){alert('当前筛选下没有题目');return}
  state={questions:pool,index:0,answers:{},checked:{},submitted:false,mode:getMode(),lastWrong:[]};
  $('home').classList.add('hide');$('result').classList.add('hide');$('quiz').classList.remove('hide');$('bottomBar').classList.remove('hide');renderQuestion();window.scrollTo({top:0,behavior:'smooth'});
}
function toggleChoice(q,letter){
  if(q.type==='多选题'){const set=new Set(state.answers[q.id]||[]);set.has(letter)?set.delete(letter):set.add(letter);state.answers[q.id]=Array.from(set).sort();}
  else {state.answers[q.id]=[letter];}
}
function renderQuestion(){
  const q=state.questions[state.index],idx=state.index+1;
  $('progressText').textContent=`第 ${idx} / ${state.questions.length} 题`;
  $('scoreText').textContent=state.mode==='instant'?`已答 ${answeredCount()}｜正确 ${correctCount()}`:`已答 ${answeredCount()}｜未交卷`;
  $('progressFill').style.width=`${(idx-1)/state.questions.length*100}%`;
  $('typeTag').textContent=q.type; $('typeTag').className=q.type==='多选题'?'tag multi':q.type==='判断题'?'tag judge':'tag';
  $('sourceTag').textContent=q.id; $('qSource').textContent=`${q.source}｜原第 ${q.number} 题`; $('qTitle').textContent=q.question;
  const selected=state.answers[q.id]||[], locked=state.checked[q.id]||state.submitted;
  $('options').innerHTML=optLetters(q).map(l=>{const isSel=selected.includes(l);let cls='option'+(isSel?' selected':'');if(locked){if(String(q.answer).includes(l))cls+=' correct';else if(isSel)cls+=' wrong';}return `<button type="button" class="${cls}" data-letter="${l}" ${locked?'disabled':''} aria-pressed="${isSel?'true':'false'}"><span class="letter">${l}</span><span>${escapeHtml(q.options[l]||'')}</span></button>`}).join('');
  document.querySelectorAll('.option').forEach(btn=>btn.addEventListener('click',()=>{if(locked)return;toggleChoice(q,btn.dataset.letter);renderQuestion()}));
  renderExplain(q,locked); renderBottom();
}
function renderExplain(q,show){const ok=sameAnswer(state.answers[q.id]||[],q.answer);$('explain').className=show?'explain show':'explain';$('explain').innerHTML=show?`<div>${ok?'<b class="ok">回答正确</b>':'<b class="bad">回答错误</b>'}</div><div class="answer-line">你的答案：${escapeHtml(answerText(q,chosenString(q)))}</div><div class="answer-line">正确答案：<b>${escapeHtml(q.answer)}</b>　${escapeHtml(answerText(q,q.answer))}</div>`:'';}
function renderBottom(){const q=state.questions[state.index],idx=state.index,checked=state.checked[q.id]||state.submitted;$('prevBtn').disabled=idx===0;$('prevBtn').textContent='上一题';if(state.mode==='instant'){$('mainBtn').textContent=checked?(idx===state.questions.length-1?'查看结果':'下一题'):'确认本题'}else{$('mainBtn').textContent=idx===state.questions.length-1?'交卷':'下一题'}}
function nextOrSubmit(){const q=state.questions[state.index];if(state.mode==='instant'&&!state.checked[q.id]){if(!isAnswered(q)){alert('请先选择答案');return}state.checked[q.id]=true;renderQuestion();return}if(state.index<state.questions.length-1){state.index++;renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}else{submitQuiz();}}
function submitQuiz(){if(state.mode==='exam'){const un=state.questions.filter(q=>!isAnswered(q)).length;if(un&& !confirm(`还有 ${un} 道题未作答，确定交卷吗？`))return;}state.submitted=true;state.lastWrong=state.questions.filter(q=>!sameAnswer(state.answers[q.id]||[],q.answer));showResult();}
function showResult(){const total=state.questions.length,right=correctCount(),wrong=total-right,percent=Math.round(right/total*100);$('quiz').classList.add('hide');$('bottomBar').classList.add('hide');$('result').classList.remove('hide');$('resultStats').innerHTML=`<div class="stat"><b>${total}</b><span>本次题数</span></div><div class="stat"><b>${right}</b><span>正确</span></div><div class="stat"><b>${wrong}</b><span>错误</span></div><div class="stat"><b>${percent}%</b><span>正确率</span></div>`;$('retryWrongBtn').disabled=state.lastWrong.length===0;$('retryWrongBtn').textContent=state.lastWrong.length?`只刷本次错题（${state.lastWrong.length}题）`:'本次没有错题';renderReview();window.scrollTo({top:0,behavior:'smooth'});}
function renderReview(){const list=$('reviewList');list.innerHTML=state.questions.map((q,i)=>{const chosen=chosenString(q),ok=sameAnswer(state.answers[q.id]||[],q.answer);const tagClass=q.type==='多选题'?'tag multi':q.type==='判断题'?'tag judge':'tag';return `<div class="review-item"><div class="review-head"><span class="${tagClass}">${q.type}</span><span class="tag">${i+1}/${state.questions.length}</span><span class="${ok?'ok':'wrongTxt'}">${ok?'正确':'错误'}</span></div><div class="source">${escapeHtml(q.source)}｜原第 ${q.number} 题</div><div class="review-q">${escapeHtml(q.question)}</div><div class="answer-line">你的答案：${escapeHtml(answerText(q,chosen))}</div><div class="answer-line">正确答案：<b>${escapeHtml(q.answer)}</b>　${escapeHtml(answerText(q,q.answer))}</div></div>`}).join('')||'<div class="empty">没有回顾内容</div>'}
$('startBtn').onclick=()=>startQuiz();$('prevBtn').onclick=()=>{if(state.index>0){state.index--;renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}};$('mainBtn').onclick=nextOrSubmit;$('quitBtn').onclick=()=>{if(confirm('确定退出本次刷题吗？')){$('quiz').classList.add('hide');$('bottomBar').classList.add('hide');$('home').classList.remove('hide');window.scrollTo({top:0,behavior:'smooth'});}};$('restartBtn').onclick=()=>{$('result').classList.add('hide');$('home').classList.remove('hide');window.scrollTo({top:0,behavior:'smooth'});};$('retryWrongBtn').onclick=()=>{if(state&&state.lastWrong.length)startQuiz(state.lastWrong)};initHome();
</script>
</body>
</html>
