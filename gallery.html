<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校园风光相册 - 计算机工程系</title>
    <!-- 引入分离的 CSS 文件 -->
    <link rel="stylesheet" href="gallery.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="page-transition-overlay">
        <div class="transition-logo">
            <i class="fas fa-camera-retro"></i>
            <p>正在开启校园记忆</p>
        </div>
    </div>
    <!-- 顶部返回导航 -->
    <header class="gallery-header">
        <a href="index.html" class="back-btn">
            <i class="fas fa-chevron-left"></i> 返回
        </a>
        <h1 class="gallery-title">校园记忆</h1>
        <div class="header-placeholder"></div> <!-- 占位用，保持标题居中 -->
    </header>

    <!-- 相册网格区 -->
    <main class="gallery-container">
        <p class="gallery-tips">轻触图片可放大查看</p>
        
        <div class="photo-grid" id="photo-grid">
            <!-- 
              这里我为你预留了23个图片位置，
              请将 src 替换为你截图中的实际路径（如 img/海棠花/xxx.jpg）
            -->
            <div class="photo-item"><img src="img/校园风景/建筑内部/从窗外看大楼梯.jpg" alt="校园风景 1"></div>
            <div class="photo-item"><img src="img/校园风景/天空很好看的图+石头.jpg" alt="校园风景 2"></div>
            <div class="photo-item"><img src="img/校园风景/下雪天的校园全景.jpg" alt="校园风景 3"></div>
            <div class="photo-item"><img src="img/校园风景/建筑内部/图书馆内部.jpg" alt="校园风景 4"></div>
            <div class="photo-item"><img src="img/校园风景/建筑内部/礼堂内部.jpg" alt="校园风景 5"></div>
            <div class="photo-item"><img src="img/校园风景/建筑内部/窗外.jpg" alt="校园风景 6"></div>
            <div class="photo-item"><img src="img/校园风景/建筑内部/窗外的众创空间.jpg" alt="校园风景 7"></div>
            <div class="photo-item"><img src="img/校园风景/建筑内部/黄昏的走廊.jpg" alt="校园风景 8"></div>
            <div class="photo-item"><img src="img/校园风景/教学楼和宿舍1外部/4a00439e50ee7ffd5f9da006cde02af9.jpg" alt="校园风景 9"></div>
            <div class="photo-item"><img src="img/校园风景/教学楼和宿舍1外部/74de373855493f4279d6a37b43fb5bbe.jpg" alt="校园风景 10"></div>
            <div class="photo-item"><img src="img/校园风景/教学楼和宿舍1外部/a2f0a34d54192c0ab09ea720b1ae07a1.jpg" alt="校园风景 11"></div>
            <div class="photo-item"><img src="img/校园风景/教学楼和宿舍1外部/宿舍楼加云朵.jpg" alt="校园风景 12"></div>
            <div class="photo-item"><img src="img/校园风景/教学楼和宿舍1外部/春天的12号宿舍楼.jpg" alt="校园风景 13"></div>
            <div class="photo-item"><img src="img/校园风景/教学楼和宿舍1外部/春天的一教加牌子（）有代表性.jpg" alt="校园风景 14"></div>
            <div class="photo-item"><img src="img/校园风景/海棠花/c48992f6967baf5c27c4cc9ae5973698.jpg" alt="校园风景 15"></div>
            <div class="photo-item"><img src="img/校园风景/海棠花/图书馆背景海棠花.jpg" alt="校园风景 16"></div>
            <div class="photo-item"><img src="img/校园风景/海棠花/校园的海棠花.jpg" alt="校园风景 17"></div>
            <div class="photo-item"><img src="img/校园风景/海棠花/海棠花加校徽.jpg" alt="校园风景 18"></div>

            <div class="photo-item"><img src="img/校园风景/石头/门口的石头冬季.jpg" alt="校园风景 20"></div>
            <div class="photo-item"><img src="img/校园风景/秋景/19a73397b39f69e37a00805d2c686242.jpg" alt="校园风景 21"></div>
            <div class="photo-item"><img src="img/校园风景/秋景/秋天的图书馆.jpg" alt="校园风景 22"></div>
            <div class="photo-item"><img src="img/校园风景/秋景/窗外的树叶加艺术中心.jpg" alt="校园风景 23"></div>
        </div>
    </main>

    <!-- 全屏大图预览 (Lightbox) -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close"><i class="fas fa-times"></i></span>
        <div class="lightbox-wrapper">
            <img id="lightbox-img" src="" alt="">
        </div>
    </div>

    <!-- 引入分离的 JS 文件 -->
    <script src="gallery.js"></script>
</body>
</html>
